name: Deploy to AWS EC2

# المسار هيشتغل تلقائياً لما تعمل push على فرع main
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Deploy to Server via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.HOST }}
        username: ${{ secrets.USERNAME }}
        key: ${{ secrets.SSH_KEY }}
        script: |
          # 1. التحقق من وجود مجلد المشروع على السيرفر
          if [ ! -d "task_management_app" ]; then
            git clone https://github.com/${{ github.repository }}.git task_management_app
            cd task_management_app
          else
            cd task_management_app
            git pull origin main
          fi
          
          # 2. إيقاف وحذف الحاويات القديمة والتعارضات
          sudo docker compose down --remove-orphans || true
          sudo docker container rm task_frontend task_backend task_db 2>/dev/null || true

          # 3. بناء وتشغيل الحاويات باستخدام التعديلات الجديدة
          sudo docker compose up -d --build --remove-orphans